<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CryptoPilot{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', path='css/app.css') }}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">🚀 CryptoPilot</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          {% if user %}
            <li class="nav-item"><a class="nav-link" href="/portfolio">Danh mục</a></li>
            <li class="nav-item"><a class="nav-link" href="/agent">🤖 Trợ lý AI</a></li>
            <li class="nav-item"><a class="nav-link" href="/alerts">Cảnh báo</a></li>
            <li class="nav-item">
              <a class="nav-link position-relative" href="/notifications">🔔 Thông báo
                <span id="notif-badge" class="badge rounded-pill bg-danger d-none position-absolute top-0 start-100 translate-middle">0</span>
              </a>
            </li>
            <li class="nav-item">
              <form method="post" action="/logout" class="d-inline m-0">
                <button class="btn btn-sm btn-outline-light ms-lg-2" type="submit">
                  Đăng xuất ({{ user.display_name or user.email }})
                </button>
              </form>
            </li>
          {% else %}
            <li class="nav-item"><a class="nav-link" href="/login">Đăng nhập</a></li>
            <li class="nav-item"><a class="nav-link" href="/register">Đăng ký</a></li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4 flex-grow-1">
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-dark text-white-50 py-3 mt-auto">
    <div class="container small">CryptoPilot — đồ án Software Engineering for AI</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% if user %}
  <script>
  (function () {
    const badge = document.getElementById("notif-badge");
    if (!badge) return;
    async function refresh() {
      try {
        const res = await fetch("/notifications/unread-count");
        if (!res.ok) return;
        const data = await res.json();
        if (data.count > 0) {
          badge.textContent = data.count > 99 ? "99+" : data.count;
          badge.classList.remove("d-none");
        } else {
          badge.classList.add("d-none");
        }
      } catch (e) { /* im lặng — badge không phải tính năng cốt lõi */ }
    }
    refresh();
    setInterval(refresh, 15000);  // poll mỗi 15s
  })();
  </script>
  {% endif %}
</body>
</html>
