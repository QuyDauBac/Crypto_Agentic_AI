{% extends "base.html" %}
{% block title %}Đăng ký — CryptoPilot{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="cp-card p-4">
      <h4 class="mb-3">Tạo tài khoản</h4>
      {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
      <form method="post" action="/register">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" value="{{ email or '' }}" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Tên hiển thị <span class="cp-text-secondary small">(tùy chọn)</span></label>
          <input type="text" name="display_name" class="form-control" maxlength="100">
        </div>
        <div class="mb-3">
          <label class="form-label">Mật khẩu <span class="cp-text-secondary small">(≥ 6 ký tự)</span></label>
          <input type="password" name="password" class="form-control" minlength="6" required>
        </div>
        <button type="submit" class="btn-cp-pink border-0 w-100 py-2">Đăng ký</button>
      </form>
      <p class="text-center cp-text-secondary mt-3 mb-0 small">
        Đã có tài khoản? <a href="/login">Đăng nhập</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
