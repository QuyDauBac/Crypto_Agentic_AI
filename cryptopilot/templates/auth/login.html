{% extends "base.html" %}
{% block title %}Đăng nhập — CryptoPilot{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="cp-card p-4">
      <h4 class="mb-3">Đăng nhập</h4>
      {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" value="{{ email or '' }}" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Mật khẩu</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn-cp-pink border-0 w-100 py-2">Đăng nhập</button>
      </form>
      <p class="text-center cp-text-secondary mt-3 mb-0 small">
        Chưa có tài khoản? <a href="/register">Đăng ký</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
